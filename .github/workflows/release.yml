name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Update manifest version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" \
            custom_components/zigporter/manifest.json

      - name: Package integration
        run: |
          cd custom_components/zigporter
          zip -r ../../zigporter.zip .

      - name: Generate release notes from commits
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi
          NOTES=$(git log "$RANGE" --pretty=format:"- %s" \
            | grep -v "^- release:" \
            | grep -v "^- Merge" \
            | grep -v "^- wip" \
            | grep -v "^- Initial commit")
          {
            echo "notes<<EOF"
            echo "## Changes"
            echo ""
            echo "$NOTES"
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.notes }}
          files: zigporter.zip
